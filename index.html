<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeLink Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark topbar">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                SafeLink Pro
            </a>
        </div>
    </nav>

    <section class="hero py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">

                    <div class="main-card p-4 p-md-5">

                        <h1 class="title mb-3">
                            Generate SafeLink URL
                        </h1>

                        <p class="subtitle mb-4">
                            Ubah link biasa menjadi safelink monetisasi dengan waiting page.
                        </p>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Masukkan URL
                            </label>

                            <input
                                type="url"
                                id="targetUrl"
                                class="form-control form-control-lg"
                                placeholder="https://example.com"
                            >
                        </div>

                        <button class="btn btn-success btn-lg w-100 generate-btn" onclick="generateLink()">
                            Generate Link
                        </button>

                        <div class="result-box mt-4" id="resultBox">
                            <label class="fw-semibold mb-2 d-block">
                                SafeLink URL
                            </label>

                            <div class="input-group">
                                <input type="text" class="form-control" id="resultLink" readonly>
                                <button class="btn btn-dark" onclick="copyLink()">
                                    Copy
                                </button>
                            </div>
                        </div>

                    </div>

                    <div class="stats row mt-4 g-3">
                        <div class="col-md-4">
                            <div class="stat-card">
                                <h3>100%</h3>
                                <p>Responsive</p>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="stat-card">
                                <h3>Fast</h3>
                                <p>Loading</p>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="stat-card">
                                <h3>SEO</h3>
                                <p>Friendly</p>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <footer class="py-4 text-center text-muted">
        © 2026 SafeLink Pro
    </footer>

    <script src="script.js"></script>
</body>
</html>
