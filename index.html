<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safelink Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="text-center mb-4">
    <h1 class="fw-bold">Safelink Generator</h1>
    <p class="text-muted">Protect & monetize your links easily</p>
  </div>

  <div class="card shadow-lg p-4">
    <label class="form-label">Enter your URL</label>
    <input type="url" id="inputUrl" class="form-control mb-3" placeholder="https://example.com">

    <button class="btn btn-primary w-100" onclick="generateLink()">Generate Safelink</button>

    <div id="result" class="mt-4 d-none">
      <label class="form-label">Your Safelink</label>
      <input type="text" id="outputUrl" class="form-control" readonly>
      <button class="btn btn-outline-secondary mt-2 w-100" onclick="copyLink()">Copy Link</button>
    </div>
  </div>

  <div class="text-center mt-5 text-muted small">
    Free to use - No login required
  </div>
</div>

<script src="assets/js/app.js"></script>
</body>
</html>
