<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SafeLink Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0d6efd,#6610f2);
            min-height:100vh;
            display:flex;
            align-items:center;
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 20px 60px rgba(0,0,0,.2);
        }

        .title{
            font-size:32px;
            font-weight:700;
        }

        .result-box{
            display:none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card p-5">

                <h1 class="title text-center mb-3">SafeLink URL Generator</h1>
                <p class="text-center text-muted mb-4">
                    Masukkan URL tujuan lalu generate safelink.
                </p>

                <div class="mb-3">
                    <label class="form-label">URL Tujuan</label>
                    <input type="url" id="targetUrl" class="form-control form-control-lg" placeholder="https://example.com">
                </div>

                <button onclick="generateLink()" class="btn btn-primary btn-lg w-100">
                    Generate SafeLink
                </button>

                <div class="result-box mt-4" id="resultBox">
                    <label class="form-label fw-bold">Hasil:</label>

                    <div class="input-group">
                        <input type="text" id="resultLink" class="form-control">
                        <button class="btn btn-success" onclick="copyLink()">
                            Copy
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
function generateLink(){
    let url = document.getElementById("targetUrl").value.trim();

    if(url==""){
        alert("Masukkan URL terlebih dahulu");
        return;
    }

    let encoded = btoa(url);
    let safelink = window.location.origin + "/artikel.html?url=" + encoded;

    document.getElementById("resultLink").value = safelink;
    document.getElementById("resultBox").style.display = "block";
}

function copyLink(){
    let copyText = document.getElementById("resultLink");
    copyText.select();
    document.execCommand("copy");
    alert("Link berhasil dicopy");
}
</script>

</body>
</html>
