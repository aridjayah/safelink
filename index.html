<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeLink Redirect</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }
        .box {
            max-width: 500px;
            margin: 100px auto;
        }
        .count {
            font-size: 40px;
            font-weight: bold;
            color: #dc3545;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow box text-center p-4">
        <h4 class="mb-3">🔒 SafeLink Protection</h4>
        <p class="text-muted">Anda akan diarahkan ke halaman tujuan dalam:</p>

        <div class="count" id="countdown">5</div>

        <button id="btnGo" class="btn btn-primary mt-3" disabled>
            Lanjutkan
        </button>

        <p class="mt-3 small text-muted">
            Jika tidak redirect otomatis, klik tombol di atas.
        </p>
    </div>
</div>

<script>
    // Ambil parameter URL
    const params = new URLSearchParams(window.location.search);
    const encoded = params.get("url");

    let target = "#";

    if (encoded) {
        try {
            target = atob(encoded);
        } catch (e) {
            alert("Link tidak valid!");
        }
    }

    let time = 5;
    const countdown = document.getElementById("countdown");
    const btn = document.getElementById("btnGo");

    const timer = setInterval(() => {
        time--;
        countdown.innerText = time;

        if (time <= 0) {
            clearInterval(timer);
            btn.disabled = false;
            window.location.href = target;
        }
    }, 1000);

    btn.addEventListener("click", () => {
        window.location.href = target;
    });
</script>

</body>
</html>
