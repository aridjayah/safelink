<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeLink Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:Arial,sans-serif;
        }

        .box{
            width:100%;
            max-width:650px;
            background:rgba(255,255,255,.15);
            backdrop-filter: blur(20px);
            border-radius:25px;
            padding:40px;
            box-shadow:0 20px 50px rgba(0,0,0,.15);
            color:white;
        }

        .form-control{
            border-radius:12px;
            padding:14px;
            border:none;
        }

        .btn-custom{
            border-radius:12px;
            padding:14px;
            font-weight:600;
        }

        .result{
            display:none;
            margin-top:25px;
            background:white;
            color:#333;
            padding:15px;
            border-radius:12px;
        }

        h1{
            font-weight:700;
            margin-bottom:10px;
        }

        p{
            opacity:.9;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>SafeLink Generator</h1>
    <p>Create secure redirect links instantly.</p>

    <div class="mt-4">
        <input type="url" id="urlInput" class="form-control mb-3" placeholder="Paste destination URL...">

        <button class="btn btn-light w-100 btn-custom" onclick="generateLink()">
            Generate Safe Link
        </button>

        <div class="result" id="resultBox">
            <label class="fw-bold mb-2">Generated URL</label>
            <input type="text" class="form-control mb-3" id="generatedLink" readonly>

            <button class="btn btn-primary w-100" onclick="copyLink()">
                Copy Link
            </button>
        </div>
    </div>
</div>

<script>
function generateLink(){
    let url = document.getElementById("urlInput").value;

    if(!url){
        alert("Please enter URL");
        return;
    }

    let encoded = btoa(url);
    let finalLink = window.location.origin + "/article.html?go=" + encoded;

    document.getElementById("generatedLink").value = finalLink;
    document.getElementById("resultBox").style.display="block";
}

function copyLink(){
    let copyText = document.getElementById("generatedLink");
    copyText.select();
    document.execCommand("copy");
    alert("Copied!");
}
</script>

</body>
</html>
