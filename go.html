<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Please Wait...</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="container py-5 text-center">

  <h2 class="fw-bold mb-3">🔒 Secure Link Access</h2>
  <p class="text-muted">Please wait while we verify your link...</p>

  <!-- Ads Area (Top) -->
  <div class="my-4">
    <!-- Google AdSense Example -->
    <div class="ads-box">Ad Space 728x90</div>
  </div>

  <div class="card shadow p-4">
    <h4 id="countdown">Wait 10 seconds...</h4>

    <button id="continueBtn" class="btn btn-success mt-3 d-none" onclick="goToLink()">
      Continue to Destination
    </button>
  </div>

  <!-- Ads Area (Bottom) -->
  <div class="my-4">
    <div class="ads-box">Ad Space 300x250</div>
  </div>

</div>

<script src="assets/js/app.js"></script>
</body>
</html>
