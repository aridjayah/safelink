<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Waiting...</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
        }

        .waiting-box{
            max-width:700px;
            margin:auto;
            margin-top:70px;
            background:white;
            border-radius:20px;
            padding:40px;
            box-shadow:0 10px 40px rgba(0,0,0,.08);
        }

        .counter{
            font-size:60px;
            font-weight:bold;
            color:#0d6efd;
        }

        .go-btn{
            display:none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="waiting-box text-center">

        <h2 class="fw-bold mb-3">Mohon Tunggu...</h2>

        <p class="text-muted mb-4">
            Link sedang diproses, silakan tunggu beberapa detik.
        </p>

        <div class="counter mb-4" id="count">10</div>

        <button id="goBtn" class="btn btn-success btn-lg go-btn">
            Lanjutkan ke Link
        </button>

    </div>
</div>

<script>
let urlParams = new URLSearchParams(window.location.search);
let encoded = urlParams.get("url");
let target = "#";

if(encoded){
    target = atob(encoded);
}

let counter = 10;
let countEl = document.getElementById("count");
let btn = document.getElementById("goBtn");

let timer = setInterval(function(){

    counter--;
    countEl.innerText = counter;

    if(counter <= 0){
        clearInterval(timer);

        countEl.style.display="none";
        btn.style.display="inline-block";

        btn.onclick=function(){
            window.location.href = target;
        }
    }

},1000);
</script>

</body>
</html>
